services:
  - type: web
    name: road-guardian-agent
    runtime: docker
    plan: starter          # $7/month — always-on (critical for emergency systems)
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_TWIML_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false